name: CI

on:
  push:
    branches: [ main ]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruby:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4']
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: RSpec (via Rake)
        run: bundle exec rake
      - name: RuboCop
        run: bundle exec rubocop
      - name: RubyDoc / YARD
        run: |
          bundle exec ruby \
            -ryard/core_ext/array \
            -ryard/core_ext/file \
            -ryard/core_ext/hash \
            -ryard/core_ext/insertion \
            -ryard/core_ext/module \
            -ryard/core_ext/string \
            -ryard/core_ext/symbol_hash \
            -e "ARGV.unshift('doc', '--no-output', '--no-save', '--quiet'); load Gem.bin_path('yard', 'yard')"
      - name: Build gem (sanity)
        run: gem build vagrant-docker-networks-manager.gemspec
